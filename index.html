<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Webhook Management | الهرم الرابع</title>

    <style>
        /* ثبات الصفحة ومنع التمرير */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(270deg, #1a002b, #2b1055, #0f3460, #16213e);
            background-size: 600% 600%;
            animation: bgMove 14s ease infinite;
        }

        @keyframes bgMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* الهيدر - اللون الأزرق الموحد وتوزيع واسع */
        header {
            width: 100%;
            padding: 25px 0;
            background: rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(12px);
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 10;
            border-bottom: 1px solid rgba(0, 198, 255, 0.2);
        }

        header a {
            color: #00c6ff; /* اللون الأزرق اللي طلبته */
            text-decoration: none;
            font-weight: bold;
            font-size: 1.25rem; /* حجم h4 */
            transition: 0.4s;
            flex: 1;
            text-align: center;
            text-shadow: 0 0 8px rgba(0, 198, 255, 0.4); /* توهج خفيف */
        }

        header a:hover {
            color: #fff;
            text-shadow: 0 0 20px #00c6ff, 0 0 30px #00c6ff;
            transform: translateY(-2px);
        }

        /* الحاوية الرئيسية */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(20px);
            padding: 35px 25px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 100%;
            max-width: 360px;
            text-align: center;
        }

        h1 {
            font-size: 26px;
            margin-bottom: 10px;
            color: #fff;
            letter-spacing: 1px;
        }

        p.description {
            font-size: 14px;
            color: #bbb;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .button {
            height: 55px;
            width: 100%;
            border-radius: 18px;
            border: none;
            background: linear-gradient(135deg, #6a5af9, #4d3cff);
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .button:active {
            transform: scale(0.95);
        }

        #deleteWebhookBtn {
            background: linear-gradient(135deg, #ff4b5c, #ff0000);
        }

        #infoWebhookBtn {
            background: linear-gradient(135deg, #00c6ff, #0072ff);
        }

        /* الفوتر */
        footer {
            padding: 15px 0;
            text-align: center;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.5px;
        }
    </style>
</head>

<body>

    <header>
        <a href="https://t.me/dmxnclp" target="_blank">قناتي</a>
        <a href="https://t.me/l1w_a1i" target="_blank">حسابي</a>
        <a href="https://t.me/Fourt7_Pyr4mid" target="_blank">مجموعتنا</a>
    </header>

    <main>
        <div class="container">
            <h1>إدارة الويب هوك</h1>
            <p class="description">مرحباً بك في منصة الهرم الرابع. تحكم في بوتات التيليجرام الخاصة بك بكل احترافية.</p>

            <div class="button-group">
                <button onclick="createWebhook()" class="button">إنشاء ويب هوك</button>
                <button onclick="deleteWebhook()" class="button" id="deleteWebhookBtn">حذف ويب هوك</button>
                <button onclick="getWebhookInfo()" class="button" id="infoWebhookBtn">معلومات التوكن</button>
            </div>
        </div>
    </main>

    <footer>
        <p>جميع الحقوق محفوظة للهرم الرابع © 2026</p>
    </footer>

    <script>
        async function apiRequest(url) {
            try {
                const response = await fetch(url);
                return await response.json();
            } catch (e) {
                return { ok: false, description: "خطأ في الاتصال بالشبكة" };
            }
        }

        async function createWebhook() {
            const token = prompt("أدخل توكن البوت:");
            if (!token) return;
            const fileUrl = prompt("أدخل رابط الملف (Webhook URL):");
            if (!fileUrl) return;

            const data = await apiRequest(`https://api.telegram.org/bot${token}/setwebhook?url=${fileUrl}`);
            alert(data.ok ? "تم ربط الويب هوك بنجاح! ✅" : "فشل: " + data.description);
        }

        async function deleteWebhook() {
            const token = prompt("أدخل التوكن للحذف:");
            if (!token) return;

            const data = await apiRequest(`https://api.telegram.org/bot${token}/deleteWebhook`);
            alert(data.ok ? "تم حذف الويب هوك بنجاح! ✅" : "فشل: " + data.description);
        }

        async function getWebhookInfo() {
            const token = prompt("أدخل التوكن لاستعراض البيانات:");
            if (!token) return;

            const data = await apiRequest(`https://api.telegram.org/bot${token}/getWebhookInfo`);
            if(data.ok) {
                alert("بيانات الويب هوك الحالية:\n\n" + JSON.stringify(data.result, null, 2));
            } else {
                alert("فشل في جلب البيانات: " + data.description);
            }
        }
    </script>

</body>
</html>
